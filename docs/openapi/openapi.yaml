  # ---- Auto Creation Intents ("Assist" AI flow) ----
  /api/frames/{frameId}/auto_creation_intents:
    post:
      tags: [Assist]
      summary: Start an AI/import-assisted creation ("Assist")
      description: |
        Kicks off async generation. Flow:
        1. POST here → returns an intent with `status: processing`.
        2. Poll `GET /auto_creation_intents/{id}` until `status: approved`
           (the `result` field is then populated).
        3. `GET /auto_creation_intents/{id}/created_items` for the ids of the
           real records created (records are created server-side on approval;
           there is no separate confirm step).

        The `engine` selects what is generated (observed: `meal_sittings_generator`,
        which produces recipes + meal sittings). Request body is a **flat object**.
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutoCreationIntentCreateRequest'
      responses:
        '200':
          description: OK (intent accepted; status typically `processing`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AutoCreationIntentResource' }

  /api/frames/{frameId}/auto_creation_intents/{intentId}:
    get:
      tags: [Assist]
      summary: Poll an auto-creation intent
      description: |
        Poll until `status` flips from `processing` to `approved`. On approval the
        `result` field carries the engine output (for `meal_sittings_generator`,
        `result.new_recipes[]` with `title` and `description`).
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
        - in: path
          name: intentId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AutoCreationIntentResource' }

  /api/frames/{frameId}/auto_creation_intents/{intentId}/created_items:
    get:
      tags: [Assist]
      summary: List records created by an approved intent
      description: |
        Returns the actual records (e.g. `Meal::Recipe`, `Meal::Sitting`) created
        from the intent's result, with their real ids for follow-up reads/edits.
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
        - in: path
          name: intentId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AutoCreatedItemResource' }