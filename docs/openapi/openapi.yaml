      summary: List planned meals (sittings) in a date window
      description: |
        Pagination is by **date range** (infinite-scroll style): the client shifts
        `date_min`/`date_max` rather than using page/offset.
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
        - in: query
          name: date_min
          required: false
          schema: { type: string, format: date }
        - in: query
          name: date_max
          required: false
          schema: { type: string, format: date }
        - in: query
          name: include
          required: false
          schema:
            type: string
            description: "CSV; observed: meal_category,meal_recipe"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/MealSittingResource' }
                  included:
