openapi: 3.0.3
info:
  title: Unofficial Skylight API (Community Reference)
  version: 0.5.0
  description: |
    Reverse-engineered reference for Skylight endpoints based on observed traffic.
    JSON:API-style resources are common (type, id, attributes, relationships).
    **Unofficial**; for research and interoperability. All examples redacted.
servers:
  - url: https://app.ourskylight.com
tags:
  - name: Frames
  - name: Chores
  - name: Categories
  - name: Devices
  - name: Lists
  - name: TaskBox
  - name: Calendars
  - name: Rewards
  - name: Meals
    description: Meal categories and the meal plan (sittings/instances).
  - name: Recipes
    description: Recipe box and recipe→grocery-list actions.
  - name: Assist
    description: >
      AI/import-assisted creation ("Assist") via auto_creation_intents. An async
      engine-driven flow (create → poll → created_items).

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    basicToken:
      type: http
      scheme: basic
      description: |
        Observed Authorization header uses an opaque Basic token. Treat as secret.

  schemas:
    JsonApiResourceId:
      type: object
      properties:
        type:
          type: string
        id:
          type: string
      required: [type, id]

    # ---- Categories ----
    CategoryAttributes:
      type: object
      properties:
        color:
          type: string
          nullable: true
          description: Hex color; observed with leading '#'
          pattern: "^#?[0-9A-Fa-f]{6}$"
        selected_for_chore_chart:
          type: boolean
          nullable: true
        linked_to_profile:
          type: boolean
          nullable: true
        label:
          type: string
          nullable: true
        profile_pic_url:
          type: string
          nullable: true
      additionalProperties: true

    CategoryResource:
      type: object
      properties:
        type:
          type: string
          description: JSON:API resource type
          enum: [category]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/CategoryAttributes'
      required: [type, id]

    # ---- Chores ----
    ChoreAttributes:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        summary:
          type: string
        status:
          type: string
          description: Known values include 'pending'
        start:
          type: string
          format: date
        start_time:
          type: string
          nullable: true
          description: e.g., '10:00'
        completed_on:
          type: string
          nullable: true
        is_future:
          type: boolean
          nullable: true
        recurring:
          type: boolean
        recurring_until:
          type: string
          nullable: true
        recurrence_set:
          type: string
          nullable: true
          description: RRULE-like string
        reward_points:
          type: integer
          nullable: true
        emoji_icon:
          type: string
          nullable: true
        routine:
          type: boolean
          nullable: true
        position:
          type: integer
          nullable: true
      additionalProperties: true

    ChoreRelationships:
      type: object
      properties:
        category:
          type: object
          properties:
            data:
              $ref: '#/components/schemas/JsonApiResourceId'

    ChoreResource:
      type: object
      properties:
        type:
          type: string
          description: JSON:API resource type
          enum: [chore]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/ChoreAttributes'
        relationships:
          $ref: '#/components/schemas/ChoreRelationships'
      required: [type, id, attributes]

    # ---- Devices ----
    DeviceAttributes:
      type: object
      description: Placeholder until a 200 body is captured.
      additionalProperties: true

    DeviceResource:
      type: object
      properties:
        type:
          type: string
          enum: [device]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/DeviceAttributes'
      required: [type, id]

    # ---- Lists ----
    ListAttributes:
      type: object
      properties:
        label:
          type: string
        color:
          type: string
          nullable: true
          description: Hex color; observed with leading '#'
          pattern: "^#?[0-9A-Fa-f]{6}$"
        kind:
          type: string
          description: "Known values: shopping or to_do"
        default_grocery_list:
          type: boolean
      additionalProperties: true

    ListRelationships:
      type: object
      properties:
        list_items:
          type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/JsonApiResourceId'

    ListResource:
      type: object
      properties:
        type:
          type: string
          enum: [list]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/ListAttributes'
        relationships:
          $ref: '#/components/schemas/ListRelationships'
      required: [type, id, attributes]

    ListItemAttributes:
      type: object
      properties:
        label:
          type: string
        status:
          type: string
          enum: [pending, completed]
        section:
          type: string
          nullable: true
        position:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true

    ListItemResource:
      type: object
      properties:
        type:
          type: string
          enum: [list_item]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/ListItemAttributes'
      required: [type, id]

    # ---- Task Box Items ----
    TaskBoxItemAttributes:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        summary:
          type: string
        emoji_icon:
          type: string
          nullable: true
        routine:
          type: boolean
          nullable: true
        reward_points:
          type: integer
          nullable: true
      additionalProperties: true

    TaskBoxItemResource:
      type: object
      properties:
        type:
          type: string
          enum: [task_box_item]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/TaskBoxItemAttributes'
      required: [type, id, attributes]

    # ---- Frames (minimal) ----
    FrameAttributes:
      type: object
      additionalProperties: true

    FrameResource:
      type: object
      properties:
        type:
          type: string
          enum: [frame]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/FrameAttributes'
      required: [type, id]

    # ---- Calendars ----
    SourceCalendarAttributes:
      type: object
      additionalProperties: true

    SourceCalendarResource:
      type: object
      properties:
        type:
          type: string
          enum: [source_calendar]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/SourceCalendarAttributes'
      required: [type, id]

    CalendarEventAttributes:
      type: object
      description: Placeholder; fields will be added as captured.
      additionalProperties: true

    CalendarEventResource:
      type: object
      properties:
        type:
          type: string
          enum: [calendar_event]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/CalendarEventAttributes'
      required: [type, id]

    # ---- Rewards ----
    RewardAttributes:
      type: object
      additionalProperties: true

    RewardResource:
      type: object
      properties:
        type:
          type: string
          enum: [reward]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/RewardAttributes'
      required: [type, id]

    RewardPointAttributes:
      type: object
      additionalProperties: true

    RewardPointResource:
      type: object
      properties:
        type:
          type: string
          enum: [reward_point]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/RewardPointAttributes'
      required: [type, id]

    # ---- Meal Categories ----
    MealCategoryAttributes:
      type: object
      properties:
        label:
          type: string
          description: e.g., Breakfast, Lunch, Dinner, Snack
        color:
          type: string
          nullable: true
          description: Hex color; observed with leading '#'
          pattern: "^#?[0-9A-Fa-f]{6}$"
        enabled:
          type: boolean
        position:
          type: integer
          description: Display order (0-based)
      additionalProperties: true

    MealCategoryResource:
      type: object
      properties:
        type:
          type: string
          enum: [meal_category]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/MealCategoryAttributes'
      required: [type, id]

    # ---- Recipes ----
    # Captured from GET /meals/recipes/{id}. IMPORTANT: recipes are NOT structured.
    # Ingredients and instructions are embedded as free text inside `description`,
    # by convention under "Ingredients:" and "Instructions:" headers. There is no
    # ingredients array, servings, time, or image field in the observed payload.
    MealRecipeAttributes:
      type: object
      properties:
        summary:
          type: string
          description: Recipe title/name
        description:
          type: string
          nullable: true
          description: >
            Free-text recipe body. By convention contains an "Ingredients:" block
            (newline-delimited items) followed by an "Instructions:" block
            (newline-delimited, numbered steps). NOT machine-structured — parse
            this text to extract ingredients/steps.
        draft:
          type: boolean
      additionalProperties: true

    MealRecipeRelationships:
      type: object
      properties:
        meal_category:
          type: object
          properties:
            data:
              $ref: '#/components/schemas/JsonApiResourceId'

    MealRecipeResource:
      type: object
      properties:
        type:
          type: string
          enum: [meal_recipe]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/MealRecipeAttributes'
        relationships:
          $ref: '#/components/schemas/MealRecipeRelationships'
      required: [type, id]

    # ---- Meal Sittings (a recipe/meal planned on one or more dates) ----
    MealSittingAttributes:
      type: object
      properties:
        summary:
          type: string
          description: Meal title (often the recipe name)
        description:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        rrule:
          type: string
          nullable: true
          description: RRULE string when the meal recurs; null for one-off meals
        draft:
          type: boolean
        recurring:
          type: boolean
        instances:
          type: array
          description: Concrete dates this sitting occurs on (YYYY-MM-DD)
          items:
            type: string
            format: date
      additionalProperties: true

    MealSittingRelationships:
      type: object
      properties:
        meal_category:
          type: object
          properties:
            data:
              $ref: '#/components/schemas/JsonApiResourceId'
        meal_recipe:
          type: object
          properties:
            data:
              $ref: '#/components/schemas/JsonApiResourceId'
        profiles:
          type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/JsonApiResourceId'

    MealSittingResource:
      type: object
      properties:
        type:
          type: string
          enum: [meal_sitting]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/MealSittingAttributes'
        relationships:
          $ref: '#/components/schemas/MealSittingRelationships'
      required: [type, id, attributes]

    # Create body is a FLAT object (NOT JSON:API type/attributes wrapped),
    # as observed on POST /meals/sittings.
    MealSittingCreateRequest:
      type: object
      properties:
        summary:
          type: string
        recipeId:
          type: integer
          nullable: true
          description: Numeric meal_recipe id to attach; null for a free-text meal
        categoryId:
          type: integer
          description: Numeric meal_category id (which meal slot)
        date:
          type: string
          format: date
          description: The day the meal is planned for (YYYY-MM-DD)
        recurring:
          type: boolean
        description:
          type: string
          nullable: true
        saveToRecipeBox:
          type: boolean
          description: If true, persist an ad-hoc meal into the recipe box
      required: [summary, categoryId, date]

    # ---- Meal Recipe create (flat body) ----
    # Flat request body observed on POST /meals/recipes (NOT JSON:API wrapped).
    MealRecipeCreateRequest:
      type: object
      properties:
        summary:
          type: string
          description: Recipe title/name
        description:
          type: string
          nullable: true
          description: >
            Free-text recipe body (Ingredients:/Instructions: convention). See
            MealRecipeAttributes — not machine-structured.
        meal_category_id:
          type: string
          nullable: true
          description: Numeric meal_category id (as a string), e.g. "2961982"
      required: [summary]

    # ---- Auto Creation Intents (the "Assist" AI backend) ----
    # Generalised AI/import-assisted creation. The `engine` selects what is built
    # (observed: meal_sittings_generator). Flow: POST to start → poll GET until
    # status flips processing→approved (result embedded) → GET .../created_items
    # for the ids of the real records created. `attachment_put_url` is a presigned
    # upload slot, likely used by mobile "Assist" to attach a photo/email payload.
    AutoCreationIntentAttributes:
      type: object
      properties:
        created_via:
          type: string
          description: e.g., app_form
        created_at:
          type: string
          format: date-time
        label:
          type: string
          nullable: true
          description: Human summary once resolved, e.g. "1 recipe and 1 meal"
        engine:
          type: string
          description: "Generation engine. Observed: meal_sittings_generator"
        status:
          type: string
          description: >
            Lifecycle status. Observed: processing, approved. Other terminal
            states (e.g. failed/rejected) likely exist but were not captured.
          enum: [processing, approved]
        external_result_url:
          type: string
          nullable: true
        result:
          type: object
          nullable: true
          description: >
            Engine-specific result payload; null until approved. For
            meal_sittings_generator: { new_recipes: [ { title, description } ] }.
          additionalProperties: true
        attachment_put_url:
          type: string
          nullable: true
          description: Presigned PUT URL for attaching an input file/image, when applicable.
      additionalProperties: true

    AutoCreationIntentResource:
      type: object
      properties:
        type:
          type: string
          enum: [auto_creation_intent]
        id:
          type: string
        attributes:
          $ref: '#/components/schemas/AutoCreationIntentAttributes'
      required: [type, id]

    # Flat request body observed on POST /auto_creation_intents.
    AutoCreationIntentCreateRequest:
      type: object
      properties:
        engine:
          type: string
          description: "Generation engine. Observed: meal_sittings_generator"
        text:
          type: string
          description: Natural-language prompt (e.g. "easy tomato soup")
        created_via:
          type: string
          description: e.g., app_form
        meal_category_id:
          type: string
          nullable: true
        ext:
          type: string
          nullable: true
        draft_first:
          type: boolean
        engine_inputs:
          type: object
          description: >
            Engine-specific inputs. For meal_sittings_generator:
            meal_sitting_dates (array of YYYY-MM-DD), meal_recipe_source
            (e.g. "generate"), meal_mouths_to_feed (int), add_to_grocery_list (bool).
          additionalProperties: true
      required: [engine, text]

    AutoCreatedItemAttributes:
      type: object
      properties:
        class_name:
          type: string
          description: "Backend model of the created record, e.g. Meal::Recipe, Meal::Sitting"
        label:
          type: string
          nullable: true
        sub_label:
          type: string
          nullable: true
        parent_id:
          type: string
          nullable: true
        destroyed:
          type: boolean
      additionalProperties: true

    AutoCreatedItemResource:
      type: object
      properties:
        type:
          type: string
          enum: [auto_created_item]
        id:
          type: string
          description: Id of the created record (e.g. the meal_recipe / meal_sitting id)
        attributes:
          $ref: '#/components/schemas/AutoCreatedItemAttributes'
      required: [type, id]

paths:
  # ---- Frames ----
  /api/frames/{frameId}:
    get:
      tags: [Frames]
      summary: Get frame by id
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          schema:
            type: string
          required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FrameResource'
        '304':
          description: Not Modified

  # ---- Chores ----
  /api/frames/{frameId}/chores:
    get:
      tags: [Chores]
      summary: List chores for a frame in a date range
      description: |
        Observed query params: after, before (YYYY-MM-DD), include_late (bool), filter=linked_to_profile.
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
        - in: query
          name: after
          schema: { type: string, format: date }
        - in: query
          name: before
          schema: { type: string, format: date }
        - in: query
          name: include_late
          schema: { type: boolean }
        - in: query
          name: filter
          schema:
            type: string
            enum: [linked_to_profile]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ChoreResource' }
                  included:
                    type: array
                    items: { $ref: '#/components/schemas/CategoryResource' }
        '304':
          description: Not Modified
    post:
      tags: [Chores]
      summary: Create a chore
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [chore]
                    attributes:
                      $ref: '#/components/schemas/ChoreAttributes'
                    relationships:
                      $ref: '#/components/schemas/ChoreRelationships'
                  required: [type, attributes]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ChoreResource' }
                  included:
                    type: array
                    items: { $ref: '#/components/schemas/CategoryResource' }

  # ---- Categories ----
  /api/frames/{frameId}/categories:
    get:
      tags: [Categories]
      summary: List categories
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/CategoryResource' }
        '304':
          description: Not Modified

  # ---- Devices ----
  /api/frames/{frameId}/devices:
    get:
      tags: [Devices]
      summary: List devices
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/DeviceResource' }
        '304':
          description: Not Modified

  # ---- Lists ----
  /api/frames/{frameId}/lists:
    get:
      tags: [Lists]
      summary: List lists
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ListResource' }
        '304':
          description: Not Modified

  /api/frames/{frameId}/lists/{listId}:
    get:
      tags: [Lists]
      summary: Get list by id
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
        - in: path
          name: listId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ListResource' }
                  meta:
                    type: object
                    properties:
                      sections:
                        type: array
                        items: { type: object }
                  included:
                    type: array
                    items: { $ref: '#/components/schemas/ListItemResource' }

  # ---- Task Box ----
  /api/frames/{frameId}/task_box/items:
    post:
      tags: [TaskBox]
      summary: Create a task box item
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [task_box_item]
                    attributes:
                      $ref: '#/components/schemas/TaskBoxItemAttributes'
                  required: [type, attributes]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/TaskBoxItemResource' }

  # ---- Calendars ----
  /api/frames/{frameId}/source_calendars:
    get:
      tags: [Calendars]
      summary: List source calendars
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/SourceCalendarResource' }
        '304':
          description: Not Modified

  /api/frames/{frameId}/calendar_events:
    get:
      tags: [Calendars]
      summary: List calendar events for a date range
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
        - in: query
          name: date_min
          required: true
          schema: { type: string, format: date }
        - in: query
          name: date_max
          required: true
          schema: { type: string, format: date }
        - in: query
          name: timezone
          required: false
          schema: { type: string }
        - in: query
          name: include
          required: false
          schema:
            type: string
            description: "CSV: categories,calendar_account,event_notification_setting"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/CalendarEventResource' }
                  included:
                    type: array
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/CategoryResource'
                        - $ref: '#/components/schemas/SourceCalendarResource'
        '304':
          description: Not Modified

  # ---- Rewards ----
  /api/frames/{frameId}/rewards:
    get:
      tags: [Rewards]
      summary: List rewards
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
        - in: query
          name: redeemed_at_min
          required: false
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/RewardResource' }
        '304':
          description: Not Modified

  /api/frames/{frameId}/reward_points:
    get:
      tags: [Rewards]
      summary: List reward points
      security:
        - basicToken: []
        - bearerAuth: []
      parameters:
        - in: path
          name: frameId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
